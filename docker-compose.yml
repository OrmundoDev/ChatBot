services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: chatbot_evolution
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
      - redis

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: chatbot_n8n
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      TZ: America/Sao_Paulo
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatbot_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      EVOLUTION_API_URL: http://evolution_api:8080
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/knowledge_base:/app/knowledge_base
    depends_on:
      - postgres
      - redis
      - evolution_api

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  n8n_data:
